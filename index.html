<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tarot Pro</title>
    <style>
        :root {
            --bg: #0e1621;
            --tg-blue: #2481cc;
            --gold: #f3d078;
            --card-bg: #1c2733;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: white;
            font-family: -apple-system, system-ui, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Шапка */
        .top-bar {
            padding: 40px 20px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .diary-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 8px 15px;
            border-radius: 12px;
            font-size: 14px;
            cursor: pointer;
        }

        /* Контейнер слотов */
        .slots-outer {
            flex: 2; /* Даем больше места картам */
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .slots-container {
            display: grid;
            gap: 10px;
            width: 100%;
            max-width: 400px;
        }

        /* Настройки сеток */
        .mode-1 { grid-template-columns: 1fr; width: 120px; }
        .mode-3 { grid-template-columns: repeat(3, 1fr); }
        .mode-6 { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); }

        .slot {
            aspect-ratio: 2/3.2;
            border: 1px dashed rgba(243, 208, 120, 0.3);
            border-radius: 12px;
            position: relative;
        }

        .card {
            position: absolute;
            inset: 0;
            background: var(--card-bg);
            border: 1px solid var(--gold);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: flyIn 0.4s ease-out forwards;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        @keyframes flyIn {
            0% { transform: translateY(30px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .card-emoji { font-size: 28px; }
        .card-name { font-size: 9px; color: var(--gold); font-weight: bold; margin-top: 5px; text-transform: uppercase; text-align: center; }

        /* Выбор режима ПОД картами */
        .mode-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .mode-btn {
            background: #1c2733;
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-weight: bold;
            cursor: pointer;
        }

        .mode-btn.active {
            background: var(--tg-blue);
            border-color: var(--tg-blue);
            box-shadow: 0 0 10px var(--tg-blue);
        }

        .footer {
            padding: 20px 20px calc(30px + env(safe-area-inset-bottom));
            background: #17212b;
        }

        .btn {
            width: 100%;
            height: 56px;
            background: var(--tg-blue);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 17px;
            font-weight: 600;
            transition: 0.3s;
        }

        /* Серая кнопка переиграть */
        .btn.reset-state {
            background: #313d4d !important;
            color: #ffffff;
        }

        /* Дневник */
        #diary-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 1000;
            flex-direction: column;
        }

        .diary-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100%, 1fr));
            gap: 15px;
        }

        .diary-row {
            display: flex;
            background: #17212b;
            padding: 12px;
            border-radius: 15px;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .diary-row:nth-child(even) { flex-direction: row-reverse; text-align: right; }

        .mini-card {
            width: 50px;
            height: 75px;
            background: #1c2733;
            border: 1px solid var(--gold);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .close-x { font-size: 30px; color: white; background: none; border: none; padding: 20px; text-align: right; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div style="font-weight: bold; color: var(--gold)">🔮 TAROT BOT</div>
        <button class="diary-btn" onclick="toggleDiary(true)">📕 ДНЕВНИК</button>
    </div>

    <!-- Место для карт -->
    <div class="slots-outer">
        <div class="slots-container mode-1" id="slots-box"></div>
    </div>

    <!-- Выбор режима ПОД картами -->
    <div class="mode-selector" id="selector">
        <button class="mode-btn active" onclick="setMode(1)">1</button>
        <button class="mode-btn" onclick="setMode(3)">3</button>
        <button class="mode-btn" onclick="setMode(6)">6</button>
    </div>

    <div class="footer">
        <button class="btn" id="mainBtn" onclick="drawCard()">ВЫТЯНУТЬ КАРТУ</button>
    </div>

    <!-- Модалка дневника -->
    <div id="diary-modal">
        <button class="close-x" onclick="toggleDiary(false)">✕</button>
        <div class="diary-list" id="diary-inject"></div>
    </div>

    <script>
        const cardsData = [
            {n: 'Смерть', e: '💀', d: 'Трансформация и глубокие перемены.'},
            {n: 'Золото', e: '💰', d: 'Материальное благополучие и прибыль.'},
            {n: 'Любовь', e: '❤️', d: 'Гармония, чувства и сильная привязанность.'},
            {n: 'Красота', e: '💎', d: 'Эстетика и уверенность в своем превосходстве.'},
            {n: 'Чума', e: '🎭', d: 'Скрытые угрозы и неискренность вокруг.'},
            {n: 'Солнце', e: '☀️', d: 'Абсолютный успех, ясность и радость.'},
            {n: 'Луна', e: '🌙', d: 'Иллюзии, мечты и тайные знания.'},
            {n: 'Сила', e: '🦁', d: 'Внутренняя мощь и контроль над ситуацией.'},
            {n: 'Удача', e: '🍀', d: 'Счастливый случай и успех в риске.'},
            {n: 'Вдохновление', e: '🖼️', d: 'Вдохновление - это то чего человек не может найти'},
            {n: 'Урожай', e: '🌾', d: 'Что посеешь, то и пожнешь. Урожай — это не только дар, но и отражение твоей заботы и долгого ожидания'},
            {n: 'Время', e: '⌛', d: 'Час настал. Время превратило твои старания в реальный результат'}
        ];

        let mode = 1;
        let drawn = 0;
        let used = [];

        function setMode(n) {
            if (drawn > 0) return;
            mode = n;
            const box = document.getElementById('slots-box');
            box.className = `slots-container mode-${n}`;
            box.innerHTML = '';
            for(let i=0; i<n; i++) box.innerHTML += `<div class="slot" id="slot-${i}"></div>`;
            
            document.querySelectorAll('.mode-btn').forEach((b, idx) => {
                b.classList.toggle('active', [1,3,6][idx] === n);
            });
        }
        setMode(1);

        function drawCard() {
            const btn = document.getElementById('mainBtn');
            if (drawn >= mode) { location.reload(); return; }

            document.getElementById('selector').style.opacity = '0.3';
            document.getElementById('selector').style.pointerEvents = 'none';

            let r;
            do { r = Math.floor(Math.random() * cardsData.length); } while (used.includes(r));
            used.push(r);

            const card = cardsData[r];
            document.getElementById(`slot-${drawn}`).innerHTML = `
                <div class="card">
                    <span class="card-emoji">${card.e}</span>
                    <span class="card-name">${card.n}</span>
                </div>
            `;
            drawn++;

            if (drawn === mode) {
                btn.innerText = 'ПЕРЕИГРАТЬ';
                btn.classList.add('reset-state');
            }
        }

        function toggleDiary(s) {
            const m = document.getElementById('diary-modal');
            m.style.display = s ? 'flex' : 'none';
            if(s) {
                document.getElementById('diary-inject').innerHTML = cardsData.map(c => `
                    <div class="diary-row">
                        <div class="mini-card">${c.e}</div>
                        <div>
                            <div style="color:var(--gold); font-weight:bold; font-size:14px;">${c.n}</div>
                            <div style="color:#708499; font-size:12px;">${c.d}</div>
                        </div>
                    </div>
                `).join('');
            }
        }
    </script>
</body>
</html>
