<!DOCTYPE html>
<html lang="ru">
<head>
    <!-- Эта строка обязательна для русского языка -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tarot Diary App</title>
    <style>
        :root {
            --bg: #0e1621;
            --tg-blue: #2481cc;
            --gold: #f3d078;
            --modal-bg: #17212b;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: white;
            font-family: -apple-system, system-ui, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Улучшенная шапка, чтобы ничего не накладывалось */
        .top-bar {
            padding: 40px 20px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            color: var(--gold);
            font-weight: bold;
            font-size: 18px;
            flex: 1;
            text-align: center;
            margin-left: 40px; /* Чтобы сбалансировать кнопку справа */
        }

        .diary-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 6px 12px;
            border-radius: 10px;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
        }

        .slots-container {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 10px;
        }

        .slot {
            width: 28vw;
            max-width: 100px;
            aspect-ratio: 2/3.2;
            border: 1px dashed rgba(243, 208, 120, 0.2);
            border-radius: 12px;
            position: relative;
        }

        .card {
            position: absolute;
            inset: 0;
            background: #1c2733;
            border: 1px solid var(--gold);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            animation: flyIn 0.4s ease-out forwards;
        }

        @keyframes flyIn {
            0% { transform: translateY(100px) scale(0.8); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        .card-emoji { font-size: 32px; margin-bottom: 5px; }
        .card-name { font-size: 10px; color: var(--gold); font-weight: bold; text-transform: uppercase; text-align: center; padding: 0 4px; }

        .deck-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .deck {
            width: 80px;
            height: 120px;
            background: linear-gradient(135deg, var(--tg-blue), #1c2733);
            border-radius: 10px;
            border: 2px solid rgba(255,255,255,0.2);
            box-shadow: 0 5px 25px rgba(0,0,0,0.5);
        }

        .footer {
            padding: 20px 20px calc(30px + env(safe-area-inset-bottom));
            background: #17212b;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .btn {
            width: 100%;
            height: 54px;
            background: var(--tg-blue);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 16px;
            font-weight: 600;
        }

        /* ДНЕВНИК */
        #diary-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 100;
            flex-direction: column;
        }

        .modal-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .diary-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }

        .diary-item {
            background: var(--modal-bg);
            padding: 15px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .diary-item:nth-child(even) { flex-direction: row-reverse; text-align: right; }

        .diary-card-preview {
            min-width: 60px;
            height: 90px;
            background: #1c2733;
            border: 1px solid var(--gold);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .diary-text h4 { margin: 0; color: var(--gold); font-size: 15px; }
        .diary-text p { margin: 5px 0 0; font-size: 13px; color: #b1bcc9; line-height: 1.4; }

        .close-btn { background: none; border: none; color: white; font-size: 28px; }

    </style>
</head>
<body>

    <div class="top-bar">
        <div class="header-title">🔮 МАГИЯ ТАРО</div>
        <button class="diary-btn" onclick="toggleDiary(true)">📕 ДНЕВНИК</button>
    </div>

    <div class="slots-container">
        <div class="slot" id="slot-0"></div>
        <div class="slot" id="slot-1"></div>
        <div class="slot" id="slot-2"></div>
    </div>

    <div class="deck-area">
        <div class="deck" id="deck-visual"></div>
    </div>

    <div class="footer">
        <button class="btn" id="mainBtn" onclick="drawCard()">ВЫТЯНУТЬ КАРТУ</button>
    </div>

    <div id="diary-modal">
        <div class="modal-header">
            <h3 style="margin:0">📕 Дневник Карт</h3>
            <button class="close-btn" onclick="toggleDiary(false)">×</button>
        </div>
        <div class="diary-content" id="diary-list"></div>
    </div>

    <script>
        const cards = [
            {n: 'Смерть', e: '💀', d: 'Конец старого и начало нового. Время отпустить прошлое.'},
            {n: 'Золото', e: '💰', d: 'Удача в делах и неожиданное материальное пополнение.'},
            {n: 'Любовь', e: '❤️', d: 'Гармония в сердце и новые искренние чувства.'},
            {n: 'Красота', e: '💎', d: 'Внутренний свет привлечет к тебе нужных людей.'},
            {n: 'Чума', e: '🎭', d: 'Будь осторожен с окружением, возможны сплетни.'},
            {n: 'Солнце', e: '☀️', d: 'Период максимальной энергии и больших побед.'},
            {n: 'Луна', e: '🌙', d: 'Слушай интуицию, не всё является тем, чем кажется.'},
            {n: 'Сила', e: '🦁', d: 'Твоя воля поможет преодолеть любые препятствия.'},
            {n: 'Звезда', e: '✨', d: 'Твои мечты имеют огромный потенциал сбыться.'},
            {n: 'Монета', e: '🪙', d: 'Стабильность и уверенность в завтрашнем дне.'},
            {n: 'Самолёт', e: '✈️', d: 'Скорые перемены, переезд или дальнее известие.'},
            {n: 'Шут', e: '🃏', d: 'Время для авантюр и легкости. Начни с чистого листа.'},
            {n: 'Кубок', e: '🏆', d: 'Заслуженная награда за твои прошлые старания.'},
            {n: 'Пополнение', e: '🤰', d: 'Рождение новых идей или важных проектов.'},
            {n: 'Правда', e: '👁️', d: 'Тайное станет явным. Будь честен с собой.'},
            {n: 'Везение', e: '🍀', d: 'Счастливый случай поможет там, где не ждали.'},
            {n: 'Иммунитет', e: '🛡️', d: 'Твоя защита крепка. Негатив не коснется тебя.'}
        ];

        let count = 0;
        let used = [];

        function drawCard() {
            const btn = document.getElementById('mainBtn');
            if (count >= 3) { location.reload(); return; }

            let rand;
            do { rand = Math.floor(Math.random() * cards.length); } while (used.includes(rand));
            used.push(rand);

            const targetSlot = document.getElementById(`slot-${count}`);
            const data = cards[rand];
            
            targetSlot.innerHTML = `
                <div class="card">
                    <span class="card-emoji">${data.e}</span>
                    <span class="card-name">${data.n}</span>
                </div>
            `;
            count++;

            if (count === 3) {
                btn.innerText = 'ПЕРЕИГРАТЬ';
                btn.style.background = '#313d4d';
                document.getElementById('deck-visual').style.opacity = '0.2';
            }
        }

        function toggleDiary(show) {
            const modal = document.getElementById('diary-modal');
            modal.style.display = show ? 'flex' : 'none';
            if (show) renderDiary();
        }

        function renderDiary() {
            const list = document.getElementById('diary-list');
            list.innerHTML = cards.map(card => `
                <div class="diary-item">
                    <div class="diary-card-preview"><span>${card.e}</span></div>
                    <div class="diary-text">
                        <h4>${card.n}</h4>
                        <p>${card.d}</p>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
