<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tarot Fix Deck</title>
    <style>
        :root {
            --bg: #0e1621;
            --tg-blue: #2481cc;
            --gold: #f3d078;
            --card-bg: #1c2733;
            --yellow-border: #ffff00; /* Яркая желтая рамка */
            
            /* Цвета свечения ЗА картой */
            --glow-rare: rgba(16, 185, 129, 0.8);
            --glow-epic: rgba(168, 85, 247, 0.8);
            --glow-legendary: rgba(255, 215, 0, 0.8);
        }

        body {
            margin: 0;
            background: var(--bg);
            color: white;
            font-family: -apple-system, system-ui, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .top-bar { padding: 40px 15px 10px; display: flex; justify-content: space-between; align-items: center; }
        .promo-btn { background: #2b3a4a; border: 1px solid var(--tg-blue); color: var(--tg-blue); padding: 8px 12px; border-radius: 10px; font-size: 12px; font-weight: bold; }
        .diary-btn { background: rgba(255, 255, 255, 0.1); border: 1px solid var(--gold); color: var(--gold); padding: 8px 12px; border-radius: 10px; font-size: 12px; }

        .slots-outer { flex: 2; display: flex; align-items: center; justify-content: center; padding: 10px; }
        .slots-container { display: grid; gap: 8px; width: 100%; max-width: 400px; }
        .mode-1 { grid-template-columns: 1fr; width: 110px; }
        .mode-3 { grid-template-columns: repeat(3, 1fr); }
        .mode-6 { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); }

        .slot { aspect-ratio: 2/3.2; border: 1px dashed rgba(243, 208, 120, 0.2); border-radius: 10px; position: relative; }
        
        /* КАРТОЧКА С ЖЕЛТОЙ РАМКОЙ */
        .card { 
            position: absolute; inset: 0; 
            background: var(--card-bg); 
            border: 2px solid var(--yellow-border); 
            border-radius: 10px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            animation: flyIn 0.4s ease-out forwards; 
        }
        
        /* СВЕЧЕНИЕ ЗА КАРТОЧКОЙ */
        .rare { box-shadow: 0 0 15px var(--glow-rare); }
        .epic { box-shadow: 0 0 15px var(--glow-epic); }
        .legendary { box-shadow: 0 0 20px var(--glow-legendary); }
        .ordinary { box-shadow: none; }

        @keyframes flyIn { 0% { transform: translateY(30px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        .card-emoji { font-size: 26px; }
        .card-name { font-size: 8px; color: var(--gold); font-weight: bold; margin-top: 4px; text-transform: uppercase; text-align: center; }

        .mode-selector { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .mode-btn { background: #1c2733; border: 1px solid rgba(255,255,255,0.1); color: white; width: 40px; height: 40px; border-radius: 25%; font-weight: bold; }
        .mode-btn.active { background: var(--tg-blue); box-shadow: 0 0 10px var(--tg-blue); }

        .footer { padding: 20px 20px calc(30px + env(safe-area-inset-bottom)); background: #17212b; }
        .btn { width: 100%; height: 54px; background: var(--tg-blue); border: none; border-radius: 14px; color: white; font-weight: 600; }
        .btn.reset-state { background: #313d4d !important; color: #ffffff; }

        .modal { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 1000; flex-direction: column; }
        .modal-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .close-x { font-size: 30px; color: white; background: none; border: none; }

        .diary-list { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .diary-row { display: flex; background: #17212b; padding: 12px; border-radius: 15px; align-items: center; gap: 15px; border: 1px solid rgba(255,255,255,0.05); width: 100%; box-sizing: border-box; }
        
        /* МИНИ-КАРТА В ДНЕВНИКЕ */
        .mini-card { 
            min-width: 60px; max-width: 60px; height: 90px; 
            background: #1c2733; 
            border: 2px solid var(--yellow-border); 
            border-radius: 8px; 
            display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; 
        }
        
        .toggle-btn { background: #313d4d; border: none; color: white; padding: 5px 10px; border-radius: 5px; font-size: 10px; margin-top: 5px; cursor: pointer; }
        .toggle-btn.active { background: #10b981; }
        .locked { filter: grayscale(1) blur(2px); opacity: 0.5; box-shadow: none !important; }

        .promo-input-box { padding: 40px 20px; text-align: center; }
        .promo-input-box input { 
            width: 100%; padding: 15px; background: #1c2733; border: 1px solid var(--tg-blue); border-radius: 10px; color: white; font-size: 18px; text-align: center; text-transform: uppercase; box-sizing: border-box; 
        }

        .tear-btn {
            background: #8b0000; color: white; border: 1px solid #ff4c4c; padding: 12px; border-radius: 10px; margin: 10px 0 20px; width: 100%; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="promo-btn" onclick="openPromo()">🎟 ПРОМОКОД</button>
        <div style="font-weight: bold; color: var(--gold); font-size: 14px;">🔮 ТАРО</div>
        <button class="diary-btn" onclick="toggleDiary(true)">📕 ДНЕВНИК</button>
    </div>

    <div class="slots-outer">
        <div class="slots-container mode-1" id="slots-box"></div>
    </div>

    <div class="mode-selector" id="selector">
        <button class="mode-btn active" onclick="setMode(1)">1</button>
        <button class="mode-btn" onclick="setMode(3)">3</button>
        <button class="mode-btn" onclick="setMode(6)">6</button>
    </div>

    <div class="footer">
        <button class="btn" id="mainBtn" onclick="drawCard()">ВЫТЯНУТЬ КАРТУ</button>
    </div>

    <div id="promo-modal" class="modal">
        <div class="modal-header"><h3>Промокод</h3><button class="close-x" onclick="closePromo()">×</button></div>
        <div class="promo-input-box">
            <input type="text" id="promo-field" placeholder="ВВЕДИТЕ КОД">
            <button class="btn" style="margin-top: 20px;" onclick="checkPromo()">АКТИВИРОВАТЬ</button>
        </div>
    </div>

    <div id="diary-modal" class="modal">
        <div class="modal-header"><h3>📕 Дневник</h3><button class="close-x" onclick="toggleDiary(false)">×</button></div>
        <div id="deck-status" style="text-align: center; font-size: 11px; color: var(--gold); padding: 5px;"></div>
        <div class="diary-list" id="diary-inject"></div>
    </div>

    <script>
        const cardsData = [
            {id: 0, n: 'Смерть', e: '💀', d: 'Трансформация и глубокие перемены.', locked: false, inDeck: true, rarity: 'ordinary'},
            {id: 1, n: 'Золото', e: '💰', d: 'Материальное благополучие и прибыль.', locked: false, inDeck: true, rarity: 'ordinary'},
            {id: 2, n: 'Любовь', e: '❤️', d: 'Гармония, чувства и сильная привязанность.', locked: false, inDeck: true, rarity: 'ordinary'},
            {id: 3, n: 'Красота', e: '💎', d: 'Эстетика и уверенность в своем превосходстве.', locked: false, inDeck: true, rarity: 'ordinary'},
            {id: 4, n: 'Чума', e: '🎭', d: 'Скрытые угрозы и неискренность вокруг.', locked: false, inDeck: true, rarity: 'ordinary'},
            {id: 14, n: 'Шут', e: '🃏', d: 'Ваш дальнейший путь будет смешным и ужасным.', locked: true, inDeck: false, code: 'KLOYN', rarity: 'epic'},
            {id: 5, n: 'Солнце', e: '☀️', d: 'Абсолютный успех, ясность и радость.', locked: false, inDeck: true, rarity: 'ordinary'},
            {id: 6, n: 'Луна', e: '🌙', d: 'Иллюзии, мечты и тайные знания.', locked: false, inDeck: true, rarity: 'ordinary'},
            {id: 7, n: 'Сила', e: '🦁', d: 'Внутренняя мощь и контроль над ситуацией.', locked: false, inDeck: true, rarity: 'ordinary'},
            {id: 8, n: 'Удача', e: '🍀', d: 'Счастливый случай и успех в риске.', locked: false, inDeck: true, rarity: 'ordinary'},
            {id: 9, n: 'Вдохновление', e: '🖼️', d: 'Вдохновение — это то, чего человек не может найти.', locked: false, inDeck: true, rarity: 'epic'},
            {id: 10, n: 'Урожай', e: '🌾', d: 'Что посеешь, то и пожнешь. Отражение твоей заботы.', locked: false, inDeck: true, rarity: 'ordinary'},
            {id: 11, n: 'Время', e: '⌛', d: 'Час настал. Время превратило старания в результат.', locked: false, inDeck: true, rarity: 'rare'},
            {id: 12, n: 'Дьявол', e: '🔥', d: 'Искушение и материальные привязанности.', locked: true, inDeck: false, code: 'DEVIL', rarity: 'epic'},
            {id: 13, n: 'six seven', e: '6️⃣7️⃣', d: 'Сикс с дедом. Особая карта.', locked: true, inDeck: false, code: '67', rarity: 'legendary'},
            {id: 14, n: 'Биология', e: '🪦', d: 'Оно🐶🚕 к тебе придёт и поставит 2️⃣🔪', locked: true, inDeck: false, code: 'BIOLOGIA666', rarity: 'legendary'}
        ];

        function loadState() {
            const saved = localStorage.getItem('tarotDeckState');
            if (saved) {
                const parsed = JSON.parse(saved);
                parsed.forEach(s => {
                    const card = cardsData.find(c => c.id === s.id);
                    if (card) { card.locked = s.locked; card.inDeck = s.inDeck; }
                });
            }
        }
        function saveState() {
            localStorage.setItem('tarotDeckState', JSON.stringify(cardsData.map(c => ({id:c.id, locked:c.locked, inDeck:c.inDeck}))));
        }

        loadState();
        let currentMode = 1;
        let drawnCount = 0;
        let used = [];

        function setMode(n) {
            if (drawnCount > 0) return;
            currentMode = n;
            const box = document.getElementById('slots-box');
            box.className = `slots-container mode-${n}`;
            box.innerHTML = '';
            for(let i=0; i<n; i++) box.innerHTML += `<div class="slot" id="slot-${i}"></div>`;
            document.querySelectorAll('.mode-btn').forEach((b, i) => b.classList.toggle('active', [1,3,6][i] == n));
        }
        setMode(1);

        function drawCard() {
            const activeDeck = cardsData.filter(c => !c.locked && c.inDeck);
            if (drawnCount >= currentMode) { resetGame(); return; }
            if (activeDeck.length < 6) { alert(`В колоде ${activeDeck.length} карт! Нужно минимум 6.`); return; }

            document.getElementById('selector').style.opacity = '0.3';
            document.getElementById('selector').style.pointerEvents = 'none';

            let r;
            do { r = activeDeck[Math.floor(Math.random() * activeDeck.length)]; } while (used.includes(r.id));
            used.push(r.id);
            
            document.getElementById(`slot-${drawnCount}`).innerHTML = `<div class="card ${r.rarity}"><span class="card-emoji">${r.e}</span><span class="card-name">${r.n}</span></div>`;
            drawnCount++;

            if (drawnCount === currentMode) {
                const btn = document.getElementById('mainBtn');
                btn.innerText = 'ПЕРЕИГРАТЬ';
                btn.classList.add('reset-state');
            }
        }

        function resetGame() {
            drawnCount = 0; used = [];
            const btn = document.getElementById('mainBtn');
            btn.innerText = 'ВЫТЯНУТЬ КАРТУ';
            btn.classList.remove('reset-state');
            document.getElementById('selector').style.opacity = '1';
            document.getElementById('selector').style.pointerEvents = 'auto';
            setMode(currentMode);
        }

        function openPromo() { document.getElementById('promo-modal').style.display = 'flex'; }
        function closePromo() { document.getElementById('promo-modal').style.display = 'none'; }
        function checkPromo() {
            const val = document.getElementById('promo-field').value.toUpperCase();
            let found = false;
            cardsData.forEach(c => { if (c.locked && c.code === val) { c.locked = false; c.inDeck = true; found = true; } });
            if (found) { saveState(); alert("✅ Новая карта открыта!"); closePromo(); document.getElementById('promo-field').value = ''; } 
            else { alert("❌ Неверный код!"); }
        }

        function toggleDiary(s) { document.getElementById('diary-modal').style.display = s ? 'flex' : 'none'; if(s) renderDiary(); }

        function renderDiary() {
            const list = document.getElementById('diary-inject');
            const inDeckCount = cardsData.filter(c => !c.locked && c.inDeck).length;
            document.getElementById('deck-status').innerText = `В колоде: ${inDeckCount} (мин. 6)`;
            
            list.innerHTML = cardsData.map(c => `
                <div class="diary-row">
                    <div class="mini-card ${c.locked ? 'locked' : c.rarity}">${c.locked ? '🔒' : c.e}</div>
                    <div class="diary-text">
                        <div style="color:var(--gold); font-weight:bold; font-size:14px;">${c.locked ? '???' : c.n}</div>
                        <div style="color:#708499; font-size:11px;">${c.locked ? 'У вас нет этой карты!' : c.d}</div>
                        ${!c.locked ? `<button class="toggle-btn ${c.inDeck ? 'active' : ''}" onclick="toggleCard(${c.id})">${c.inDeck ? 'В КОЛОДЕ' : 'НЕ В КОЛОДЕ'}</button>` : ''}
                    </div>
                </div>
            `).join('') + `<button class="tear-btn" onclick="tearCards()">🔪 ПОРВАТЬ ПРОМО-КАРТЫ</button>`;
        }

        function toggleCard(id) {
            const card = cardsData.find(c => c.id === id);
            card.inDeck = !card.inDeck;
            saveState(); renderDiary();
        }

        function tearCards() {
            if (confirm("Точно порвать все промо-карты?")) {
                cardsData.forEach(c => { if (c.code) { c.locked = true; c.inDeck = false; } });
                saveState(); renderDiary(); resetGame();
            }
        }
    </script>
</body>
</html>
